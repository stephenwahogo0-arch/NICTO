<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">  <defs>    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">      <stop offset="0%" stop-color="#0a0a1a"/>      <stop offset="100%" stop-color="#1a0a2e"/>    </linearGradient>    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">      <stop offset="0%" stop-color="#00d4ff"/>      <stop offset="100%" stop-color="#7b2ff7"/>    </linearGradient>    <linearGradient id="hash1" x1="0%" y1="0%" x2="100%" y2="100%">      <stop offset="0%" stop-color="#00d4ff"/>      <stop offset="50%" stop-color="#7b2ff7"/>      <stop offset="100%" stop-color="#ff2d95"/>    </linearGradient>    <linearGradient id="hash2" x1="100%" y1="100%" x2="0%" y2="0%">      <stop offset="0%" stop-color="#ff2d95"/>      <stop offset="50%" stop-color="#7b2ff7"/>      <stop offset="100%" stop-color="#00d4ff"/>    </linearGradient>    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">      <stop offset="0%" stop-color="#00d4ff"/>      <stop offset="50%" stop-color="#ffffff"/>      <stop offset="100%" stop-color="#7b2ff7"/>    </linearGradient>    <filter id="glow">      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>      <feMerge>        <feMergeNode in="coloredBlur"/>        <feMergeNode in="SourceGraphic"/>      </feMerge>    </filter>    <filter id="glowStrong">      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>      <feMerge>        <feMergeNode in="coloredBlur"/>        <feMergeNode in="SourceGraphic"/>      </feMerge>    </filter>  </defs>  <!-- Background -->  <rect width="800" height="400" fill="url(#bg)" rx="20"/>  <!-- Subtle grid pattern -->  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">    <line x1="0" y1="50" x2="800" y2="50"/>    <line x1="0" y1="100" x2="800" y2="100"/>    <line x1="0" y1="150" x2="800" y2="150"/>    <line x1="0" y1="200" x2="800" y2="200"/>    <line x1="0" y1="250" x2="800" y2="250"/>    <line x1="0" y1="300" x2="800" y2="300"/>    <line x1="0" y1="350" x2="800" y2="350"/>    <line x1="100" y1="0" x2="100" y2="400"/>    <line x1="200" y1="0" x2="200" y2="400"/>    <line x1="300" y1="0" x2="300" y2="400"/>    <line x1="400" y1="0" x2="400" y2="400"/>    <line x1="500" y1="0" x2="500" y2="400"/>    <line x1="600" y1="0" x2="600" y2="400"/>    <line x1="700" y1="0" x2="700" y2="400"/>  </g>  <!-- Hash symbol (#) central mark -->  <g transform="translate(160, 200)" filter="url(#glowStrong)">    <!-- Vertical lines -->    <rect x="-50" y="-100" width="28" height="200" rx="14" fill="url(#hash1)" opacity="0.9"/>    <rect x="22" y="-100" width="28" height="200" rx="14" fill="url(#hash2)" opacity="0.9"/>    <!-- Horizontal lines -->    <rect x="-80" y="-60" width="160" height="28" rx="14" fill="url(#hash1)" opacity="0.8"/>    <rect x="-80" y="32" width="160" height="28" rx="14" fill="url(#hash2)" opacity="0.8"/>  </g>  <!-- Outer glow ring -->  <circle cx="160" cy="200" r="120" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>  <circle cx="160" cy="200" r="105" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.1"/>  <!-- Orbital phi ring -->  <ellipse cx="160" cy="200" rx="140" ry="140" fill="none" stroke="#7b2ff7" stroke-width="0.5" opacity="0.08"           stroke-dasharray="4 8"/>  <ellipse cx="160" cy="200" rx="155" ry="155" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.06"           stroke-dasharray="2 12"/>  <!-- Small orbital dots -->  <circle cx="160" cy="60" r="2" fill="#00d4ff" opacity="0.4"/>  <circle cx="160" cy="340" r="2" fill="#7b2ff7" opacity="0.4"/>  <circle cx="20" cy="200" r="2" fill="#ff2d95" opacity="0.4"/>  <circle cx="300" cy="200" r="2" fill="#00d4ff" opacity="0.4"/>  <!-- AKNOW# Text -->  <g transform="translate(370, 140)">    <text x="0" y="0" font-family="'Courier New', 'Consolas', monospace" font-size="76" font-weight="900"          fill="url(#textGrad)" letter-spacing="6" filter="url(#glow)">      AKNOW    </text>    <!-- Hash sign in text -->    <text x="295" y="0" font-family="'Courier New', 'Consolas', monospace" font-size="80" font-weight="900"          fill="#ff2d95" filter="url(#glow)">#</text>  </g>  <!-- Phi symbol decoration -->  <g transform="translate(380, 215)" opacity="0.5">    <text x="0" y="0" font-family="'Times New Roman', serif" font-size="28" font-style="italic"          fill="#7b2ff7">╧å</text>    <text x="25" y="-5" font-family="'Courier New', 'Consolas', monospace" font-size="10" fill="#555"          letter-spacing="2">SEED-DRIVEN</text>  </g>  <!-- Tagline -->  <g transform="translate(370, 270)">    <text x="0" y="0" font-family="'Courier New', 'Consolas', monospace" font-size="16" font-weight="700"          fill="#00d4ff" letter-spacing="8" opacity="0.7">DETERMINISTIC</text>  </g>  <!-- Subtitle -->  <g transform="translate(370, 300)">    <text x="0" y="0" font-family="'Courier New', 'Consolas', monospace" font-size="12" fill="#666"          letter-spacing="3">THE TRUTH IS A SEED</text>  </g>  <!-- Version badge -->  <g transform="translate(370, 335)">    <rect x="-5" y="-10" width="70" height="22" rx="11" fill="none" stroke="#7b2ff7" stroke-width="1" opacity="0.4"/>    <text x="30" y="4" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#7b2ff7"          text-anchor="middle" opacity="0.6">v5.0</text>  </g>  <!-- Bottom accent line -->  <line x1="370" y1="360" x2="760" y2="360" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>  <line x1="370" y1="362" x2="760" y2="362" stroke="#7b2ff7" stroke-width="0.5" opacity="0.1"/></svg>