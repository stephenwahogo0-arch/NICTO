<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GodsEyes ΓÇö Interactive Human Map</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0f; color: #e0e0e0; }#header { background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 100%); padding: 20px 30px; border-bottom: 2px solid #00d4aa; }#header h1 { color: #00d4aa; font-size: 24px; letter-spacing: 3px; }#header span { color: #666; font-size: 14px; }#container { display: flex; height: calc(100vh - 80px); }#sidebar { width: 320px; background: #12121a; padding: 15px; overflow-y: auto; border-right: 1px solid #222; }#sidebar h3 { color: #00d4aa; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }#search-box { width: 100%; padding: 10px; background: #1a1a2e; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }#search-box:focus { outline: none; border-color: #00d4aa; }#profile-list { list-style: none; }#profile-list li { padding: 8px 10px; cursor: pointer; border-radius: 4px; font-size: 13px; transition: background 0.2s; border-bottom: 1px solid #1a1a2e; }#profile-list li:hover { background: #1a1a2e; color: #00d4aa; }#profile-list li.active { background: #00d4aa22; border-left: 3px solid #00d4aa; }#map-container { flex: 1; position: relative; }#map { width: 100%; height: 100%; }#info-panel { position: absolute; bottom: 20px; left: 20px; right: 340px; background: rgba(10,10,15,0.92); padding: 15px 20px; border-radius: 8px; border: 1px solid #333; display: none; backdrop-filter: blur(8px); }#info-panel h2 { color: #00d4aa; font-size: 18px; margin-bottom: 5px; }#info-panel p { font-size: 13px; color: #aaa; margin: ],"beyonce":[29.7604,-95.3698,"Houston","USA"],"jay-z":[40.6782,-73.9442,"Brooklyn","USA"],"tupac shakur":[40.6782,-73.9442,"Brooklyn","USA"],"madonna":[42.3314,-83.0458,"Bay City","USA"],"aretha franklin":[35.1495,-90.049,"Memphis","USA"],"bob marley":[18.1096,-77.2975,"Nine Mile","Jamaica"],"johnny cash":[35.4676,-92.3549,"Kingsland","USA"],"dolly parton":[35.9606,-83.9207,"Locust Ridge","USA"],"taylor swift":[40.3487,-75.9352,"Reading","USA"],"kurt cobain":[46.9799,-123.8886,"Aberdeen","USA"],"prince":[44.9778,-93.265,"Minneapolis","USA"],"babe ruth":[39.2904,-76.6122,"Baltimore","USA"],"tom brady":[37.5448,-122.2436,"San Mateo","USA"],"roger federer":[47.5596,7.5886,"Basel","Switzerland"],"rafael nadal":[39.5696,2.6502,"Manacor","Spain"],"novak djokovic":[44.7866,20.4489,"Belgrade","Serbia"],"mike tyson":[40.6782,-73.9442,"Brooklyn","USA"],"lebron james":[41.1171,-81.5128,"Akron","USA"],"kobe bryant":[39.9526,-75.1652,"Philadelphia","USA"],"simone biles":[29.7604,-95.3698,"Houston","USA"],"michael phelps":[39.2904,-76.6122,"Baltimore","USA"],"oprah winfrey":[34.0003,-88.7037,"Kosciusko","USA"]};const map = L.map('map').setView([20, 0], 2);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {  maxZoom: 19, attribution: '┬⌐ OpenStreetMap'}).addToMap(map);let currentFilter = 'all';let markers = [];function closeInfo() { document.getElementById('info-panel').style.display = 'none'; }function showInfo(profile, marker) {  const p = document.getElementById('info-panel');  document.getElementById('info-name').textContent = profile.name;  document.getElementById('info-role').textContent = profile.occupation || '';  const years = profile.birth + '\u2013' + (profile.death || 'Present');  document.getElementById('info-years').textContent = years;  document.getElementById('info-location').textContent = profile.city + ', ' + profile.country;  document.getElementById('info-coords').textContent = profile.lat.toFixed(4) + ', ' + profile.lon.toFixed(4);  const facts = (profile.facts || []).slice(0, 2).join(' | ');  document.getElementById('info-facts').textContent = facts;  document.getElementById('info-links').innerHTML =    '<a href="https://www.openstreetmap.org/?mlat=' + profile.lat + '&mlon=' + profile.lon + '&zoom=12" target="_blank" style="color:#00d4aa;">OpenStreetMap</a>' +    ' | <a href="https://www.openstreetmap.org/#map=12/' + profile.lat + '/' + profile.lon + '" target="_blank" style="color:#00d4aa;">Satellite View</a>';  p.style.display = 'block';  if (marker) map.setView([profile.lat, profile.lon], marker.getLatLng ? undefined : 6);}function buildProfiles() {  const p = document.getElementById('profile-list');  // Build from all profiles with known locations  for (const [key, loc] of Object.entries(knownLocs)) {    const nameParts = key.split(' ');    const displayName = nameParts.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');    const cat = key.includes('einstein')||key.includes('newton')||key.includes('curie')||key.includes('darwin')||key.includes('tesla')||key.includes('galilei')||key.includes('hawking')||key.includes('turing')||key.includes('feynman')||key.includes('kepler')||key.includes('bohr')||key.includes('heisenberg')||key.includes('planck')||key.includes('pasteur')||key.includes('sagan')||key.includes('franklin')||key.includes('lovelace')||key.includes('hopper')||key.includes('goodall')||key.includes('mendeleev')||key.includes('davinci')||key.includes('edison')||key.includes('bell')||key.includes('gagarin')||key.includes('aldrin')||key.includes('armstrong') ? 'science' :      key.includes('socrates')||key.includes('plato')||key.includes('aristotle')||key.includes('kant')||key.includes('nietzsche')||key.includes('confucius')||key.includes('descartes')||key.includes('locke')||key.includes('marx')||key.includes('hume')||key.includes('aquinas')||key.includes('freud')||key.includes('jung') ? 'philosophy' :      key.includes('washington')||key.includes('lincoln')||key.includes('roosevelt')||key.includes('kennedy')||key.includes('reagan')||key.includes('obama')||key.includes('trump')||key.includes('biden')||key.includes('churchill')||key.includes('gandhi')||key.includes('mandela')||key.includes('king')||key.includes('napoleon')||key.includes('caesar')||key.includes('alexander')||key.includes('mao')||key.includes('thatcher')||key.includes('lenin')||key.includes('stalin') ? 'politics' :      key.includes('mozart')||key.includes('beethoven')||key.includes('bach')||key.includes('mercury')||key.includes('jackson')||key.includes('presley')||key.includes('bowie')||key.includes('beyonce')||key.includes('tupac')||key.includes('madonna')||key.includes('franklin')||key.includes('marley')||key.includes('cash')||key.includes('parton')||key.includes('swift')||key.includes('prince')||key.includes('cobain')||key.includes('jay') ? 'music' :      key.includes('shakespeare')||key.includes('austen')||key.includes('twain')||key.includes('orwell')||key.includes('hemingway')||key.includes('tolstoy')||key.includes('dostoevsky')||key.includes('rowling')||key.includes('garcia')||key.includes('morrison')||key.includes('de beauvoir') ? 'literature' :      key.includes('ali')||key.includes('jordan')||key.includes('williams')||key.includes('bolt')||key.includes('brady')||key.includes('federer')||key.includes('nadal')||key.includes('djokovic')||key.includes('babe')||key.includes('phelps')||key.includes('biles')||key.includes('james')||key.includes('bryant')||key.includes('tyson') ? 'sports' :      key.includes('picasso')||key.includes('kahlo')||key.includes('vangogh')||key.includes('monet')||key.includes('warhol')||key.includes('rembrandt')||key.includes('davinci') ? 'art' :      key.includes('brando')||key.includes('hepburn')||key.includes('chaplin')||key.includes('monroe')||key.includes('hanks')||key.includes('de niro')||key.includes('pink floyd')||key.includes('beatles')||key.includes('queen')||key.includes('winfrey') ? 'film' : 'default';    profiles.push({      name: displayName, key: key, lat: loc[0], lon: loc[1],      city: loc[2], country: loc[3],      category: cat, facts: [], occupation: '', birth: '', death: null    });  }  document.getElementById('profile-count').textContent = profiles.length;  filterAndRender();}function filterAndRender() {  const q = document.getElementById('search-box').value.toLowerCase();  const filtered = profiles.filter(p => {    if (currentFilter !== 'all' && p.category !== currentFilter) return false;    return p.name.toLowerCase().includes(q) || p.key.includes(q);  });  renderList(filtered);  updateMarkers(filtered);  document.getElementById('visible-count').textContent = filtered.length;}function renderList(items) {  const ul = document.getElementById('profile-list');  ul.innerHTML = items.map(p => '<li onclick="showInfo(profiles.find(x=>x.key===\'' + p.key + '\'), markers.find(m=>m.options && m.options.key===\'' + p.key + '\'))" class="' + (p.category === currentFilter ? 'active' : '') + '" style="border-left: 3px solid ' + getColor([p.category]) + ';">' + p.name + ' <span style="color:#666;font-size:11px;">' + p.city + '</span></li>').join('');}function updateMarkers(items) {  markers.forEach(m => map.removeLayer(m));  markers = [];  items.forEach(p => {    const color = getColor([p.category]);    const marker = L.circleMarker([p.lat, p.lon], {      radius: 7, fillColor: color, color: '#fff',      weight: 1, opacity: 0.8, fillOpacity: 0.7,      key: p.key    }).addToMap(map);    marker.bindTooltip(p.name, { direction: 'top', offset: [0, -8] });    marker.on('click', () => showInfo(p, marker));    markers.push(marker);  });}function setFilter(cat) {  currentFilter = cat;  document.querySelectorAll('.layer-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === cat || (cat === 'all' && b.textContent === 'All')));  filterAndRender();}function filterProfiles() { filterAndRender(); }buildProfiles();</script></body></html>
