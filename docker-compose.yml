services:
  nikto:
    build: .
    ports:
      - "4890:4890"
    volumes:
      - nikto_data:/root/.nikto
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
    network_mode: host

volumes:
  nikto_data:
