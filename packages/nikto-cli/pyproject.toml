[project]
name = "nikto-cli"
version = "0.1.0"
description = "NIKTO CLI Interface"
requires-python = ">=3.12"
dependencies = [
    "nikto-core",
    "click>=8.0.0",
    "rich>=13.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nikto_cli"]

[project.scripts]
nikto = "nikto_cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
