[project]
name = "kyros-core"
version = "0.2.0"
description = "KYROS Core Agent Runtime"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "sqlalchemy>=2.0.0",
    "chromadb>=0.6.0",
    "rich>=13.0.0",
    "click>=8.0.0",
    "pyyaml>=6.0",
    "jinja2>=3.0.0",
    "aiofiles>=24.0.0",
    "python-dotenv>=1.0.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "sse-starlette>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kyros"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
