[package]
name = "nikto-desktop"
version = "0.2.0"
description = "Nikto Desktop - Autonomous AI Chat Interface"
authors = ["Nikto"]
edition = "2021"

[lib]
name = "nikto_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
