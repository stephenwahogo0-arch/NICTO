[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nikto-core"
version = "0.2.0"
description = "Core NIKTO AI brain and agent framework"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.27.0",
    "sqlalchemy>=2.0.0",
    "chromadb>=0.6.0",
    "rich>=13.0.0",
    "textual>=1.0.0",
    "click>=8.0.0",
    "pyyaml>=6.0",
    "jinja2>=3.0.0",
    "aiofiles>=24.0.0",
    "python-dotenv>=1.0.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
cua = [
    "pyautogui>=0.9.0",
    "pillow>=10.0.0",
    "mss>=9.0.0",
]
security = [
    "semgrep>=1.70.0",
    "bandit>=1.7.9",
    "safety>=3.2.0",
    "python-nmap>=0.7.1",
    "scapy>=2.5.0",
    "paramiko>=3.4.0",
    "dnspython>=2.6.0",
    "impacket>=0.12.0",
    "shodan>=1.31.0",
    "pyshark>=0.6.0",
    "python-whois>=0.9.0",
    "netaddr>=1.2.0",
    "ldap3>=2.9.0",
    "pycryptodome>=3.20.0",
    "python-masscan>=0.1.6",
]

[project.urls]
Homepage = "https://github.com/stephenwahogo0-arch/NICTO"

[tool.setuptools.packages.find]
where = ["src"]