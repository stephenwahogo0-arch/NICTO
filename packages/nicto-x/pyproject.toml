[project]
name = "nicto-x"
version = "0.1.0"
description = "NICTO X — Frontier AI Architecture with multi-agent reasoning, memory, and autonomous execution"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "pydantic>=2.0.0",
    "networkx>=3.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
full = [
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "pillow>=10.0.0",
    "chromadb>=0.4.0",
    "sentence-transformers>=2.2.0",
    "scipy>=1.11.0",
    "psutil>=5.9.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
