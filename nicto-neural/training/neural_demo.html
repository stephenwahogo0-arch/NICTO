<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NICTO Neural Core V1 — Live Neural Network Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
}
#canvas { position: fixed; top: 0; left: 0; z-index: 0; }
.overlay {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  text-align: center;
  padding: 12px;
  background: rgba(10,10,26,0.9);
  border-bottom: 1px solid rgba(74,144,217,0.3);
}
.header h1 {
  font-size: 22px;
  background: linear-gradient(90deg, #4A90D9, #E74C3C, #2ECC71);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}
.header .subtitle { font-size: 12px; color: #888; margin-top: 2px; }
.main {
  flex: 1;
  display: flex;
  gap: 0;
  overflow: hidden;
}
.neural-view {
  flex: 2;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.side-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: rgba(10,10,26,0.95);
  border-left: 1px solid rgba(74,144,217,0.2);
  max-width: 420px;
  overflow-y: auto;
}
.panel-section {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.panel-section h3 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #4A90D9;
  margin-bottom: 8px;
}
.task-input {
  width: 100%;
  padding: 10px 14px;
  background: rgba(74,144,217,0.1);
  border: 1px solid rgba(74,144,217,0.3);
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
}
.task-input:focus { border-color: #4A90D9; }
.btn {
  padding: 8px 20px;
  background: linear-gradient(135deg, #4A90D9, #2ECC71);
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(74,144,217,0.4); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 13px;
}
.metric-label { color: #888; }
.metric-value { color: #4A90D9; font-weight: 600; font-family: monospace; }
.metric-value.green { color: #2ECC71; }
.metric-value.red { color: #E74C3C; }
.metric-value.gold { color: #F39C12; }
.brain-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
}
.brain-bar .name { width: 80px; font-size: 12px; color: #aaa; }
.brain-bar .bar-bg {
  flex: 1;
  height: 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  overflow: hidden;
}
.brain-bar .bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.8s ease;
}
.brain-bar .elo { width: 50px; text-align: right; font-size: 11px; font-family: monospace; color: #ccc; }
.log-area {
  background: rgba(0,0,0,0.3);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.6;
  max-height: 200px;
  overflow-y: auto;
  color: #aaa;
}
.log-area .step { color: #4A90D9; }
.log-area .highlight { color: #2ECC71; font-weight: 600; }
.log-area .warn { color: #F39C12; }
.log-area .dim { color: #555; }
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.status-badge.idle { background: rgba(255,255,255,0.1); color: #888; }
.status-badge.thinking { background: rgba(74,144,217,0.2); color: #4A90D9; animation: pulse 1s infinite; }
.status-badge.done { background: rgba(46,204,113,0.2); color: #2ECC71; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.pipeline-step {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 0;
  font-size: 12px;
}
.pipeline-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #333;
  transition: background 0.3s;
}
.pipeline-dot.active { background: #4A90D9; box-shadow: 0 0 8px #4A90D9; }
.pipeline-dot.done { background: #2ECC71; box-shadow: 0 0 8px #2ECC71; }
.pipeline-label { color: #888; }
.pipeline-label.active { color: #4A90D9; font-weight: 600; }
.pipeline-label.done { color: #2ECC71; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="overlay">
  <div class="header">
    <h1>NICTO Neural Core V1 — Live Neural Network</h1>
    <div class="subtitle">17B Dense Transformer | 6-Brain System | PPO RL | Autonomous AI</div>
  </div>
  <div class="main">
    <div class="neural-view" id="neuralView"></div>
    <div class="side-panel">
      <div class="panel-section">
        <h3>Task Input</h3>
        <input type="text" class="task-input" id="taskInput" value="Implement a binary search algorithm in Python" placeholder="Enter a task...">
        <div style="display:flex;gap:8px;align-items:center;margin-top:6px;">
          <button class="btn" id="processBtn" onclick="startProcessing()">Process Task</button>
          <span class="status-badge idle" id="statusBadge">IDLE</span>
        </div>
      </div>
      <div class="panel-section">
        <h3>Processing Pipeline</h3>
        <div id="pipelineSteps"></div>
      </div>
      <div class="panel-section">
        <h3>Brain Activations</h3>
        <div id="brainBars"></div>
      </div>
      <div class="panel-section">
        <h3>Live Metrics</h3>
        <div id="metrics"></div>
      </div>
      <div class="panel-section">
        <h3>Neural Activity Log</h3>
        <div class="log-area" id="logArea"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Neural Network Canvas ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Neural network nodes
const layers = [
  { name: 'Input', count: 8, x: 0.08 },
  { name: 'Tokenizer', count: 6, x: 0.18 },
  { name: 'Embedding', count: 10, x: 0.28 },
  { name: 'Transformer\n(40 layers)', count: 14, x: 0.40 },
  { name: 'Brain Heads', count: 6, x: 0.52 },
  { name: 'BrainBoost', count: 8, x: 0.64 },
  { name: 'Output', count: 6, x: 0.76 },
];

let nodes = [];
let connections = [];
let activations = [];
let processingPhase = -1;

function buildNetwork() {
  nodes = [];
  connections = [];
  const viewArea = document.getElementById('neuralView');
  const vw = viewArea.offsetWidth;
  const vh = viewArea.offsetHeight;

  layers.forEach((layer, li) => {
    const layerNodes = [];
    for (let i = 0; i < layer.count; i++) {
      const spacing = vh / (layer.count + 1);
      layerNodes.push({
        x: layer.x * vw,
        y: spacing * (i + 1),
        layer: li,
        index: i,
        activation: 0,
        targetActivation: 0,
        radius: li === 3 ? 5 : (li === 4 ? 7 : 4),
        label: li === 4 ? ['Primary','Analytical','Creative','Strategic','Knowledge','Intuitive'][i] : null,
      });
    }
    nodes.push(layerNodes);
  });

  // Build connections
  for (let li = 0; li < nodes.length - 1; li++) {
    const from = nodes[li];
    const to = nodes[li + 1];
    from.forEach((fn, fi) => {
      to.forEach((tn, ti) => {
        if (Math.random() < 0.5 || (li === 3 || li === 4)) {
          connections.push({
            from: fn, to: tn,
            weight: Math.random(),
            activation: 0,
            targetActivation: 0,
          });
        }
      });
    });
  }
}

function activateLayer(layerIndex, intensity = 1.0) {
  if (!nodes[layerIndex]) return;
  nodes[layerIndex].forEach(n => {
    n.targetActivation = intensity * (0.5 + Math.random() * 0.5);
  });
  connections.forEach(c => {
    if (c.from.layer === layerIndex) {
      c.targetActivation = intensity * c.weight;
    }
  });
}

function deactivateAll() {
  nodes.forEach(layer => layer.forEach(n => { n.targetActivation = 0; }));
  connections.forEach(c => { c.targetActivation = 0; });
}

function activateBrains(brainIndices, intensity = 1.0) {
  if (!nodes[4]) return;
  brainIndices.forEach(bi => {
    if (nodes[4][bi]) {
      nodes[4][bi].targetActivation = intensity;
    }
  });
}

function drawNetwork() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(W*0.4, H*0.5, 100, W*0.4, H*0.5, W*0.7);
  bg.addColorStop(0, 'rgba(20,20,50,0.3)');
  bg.addColorStop(1, 'rgba(10,10,26,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const viewArea = document.getElementById('neuralView');
  const offsetX = 0;
  const offsetY = viewArea.offsetTop;

  // Draw connections
  connections.forEach(c => {
    c.activation += (c.targetActivation - c.activation) * 0.08;
    const alpha = Math.max(0.02, c.activation * 0.6);
    const hue = c.activation > 0.3 ? `rgba(74,144,217,${alpha})` : `rgba(100,100,100,${alpha * 0.3})`;
    ctx.strokeStyle = hue;
    ctx.lineWidth = c.activation > 0.3 ? 1.5 : 0.5;
    ctx.beginPath();
    ctx.moveTo(c.from.x + offsetX, c.from.y + offsetY);
    ctx.lineTo(c.to.x + offsetX, c.to.y + offsetY);
    ctx.stroke();

    // Pulse particles
    if (c.activation > 0.4 && Math.random() < 0.03) {
      const t = Math.random();
      const px = c.from.x + (c.to.x - c.from.x) * t + offsetX;
      const py = c.from.y + (c.to.y - c.from.y) * t + offsetY;
      ctx.fillStyle = `rgba(46,204,113,${c.activation})`;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Draw nodes
  nodes.forEach((layer, li) => {
    layer.forEach(n => {
      n.activation += (n.targetActivation - n.activation) * 0.1;
      const x = n.x + offsetX;
      const y = n.y + offsetY;

      // Glow
      if (n.activation > 0.2) {
        const glow = ctx.createRadialGradient(x, y, 0, x, y, n.radius * 4);
        const colors = [
          'rgba(74,144,217,', 'rgba(231,76,60,', 'rgba(46,204,113,',
          'rgba(243,156,18,', 'rgba(155,89,182,', 'rgba(26,188,156,',
        ];
        const c = li === 4 ? colors[n.index % 6] : colors[0];
        glow.addColorStop(0, c + (n.activation * 0.5) + ')');
        glow.addColorStop(1, c + '0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(x, y, n.radius * 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Node
      const nodeColors = [
        '#4A90D9', '#3498DB', '#2ECC71', '#E74C3C',
        ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6','#1ABC9C'][n.index % 6],
        '#F39C12', '#2ECC71',
      ];
      const baseColor = nodeColors[li] || '#4A90D9';
      ctx.fillStyle = n.activation > 0.3 ? baseColor : '#333';
      ctx.strokeStyle = n.activation > 0.3 ? baseColor : '#444';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, n.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Labels for brain heads
      if (n.label && li === 4) {
        ctx.fillStyle = n.activation > 0.3 ? '#fff' : '#666';
        ctx.font = `${n.activation > 0.3 ? 'bold ' : ''}11px system-ui`;
        ctx.textAlign = 'left';
        ctx.fillText(n.label, x + 14, y + 4);
      }
    });

    // Layer labels
    if (layer[0]) {
      ctx.fillStyle = '#555';
      ctx.font = '10px system-ui';
      ctx.textAlign = 'center';
      const lbl = layers[li].name.split('\n');
      lbl.forEach((line, i) => {
        ctx.fillText(line, layer[0].x + offsetX, offsetY + 20 + i * 13);
      });
    }
  });

  requestAnimationFrame(drawNetwork);
}

// ── Pipeline Steps ──
const PIPELINE = [
  'Tokenize input',
  'Generate embeddings',
  'Positional encoding',
  'Transformer forward (40 layers)',
  'Brain head projection',
  'ELO-based brain selection',
  'BrainBoost ensemble',
  'Reward shaping',
  'Consistency check (σ)',
  'ELO update',
  'Memory store',
  'Output generation',
];

function renderPipeline(activeStep = -1) {
  const el = document.getElementById('pipelineSteps');
  el.innerHTML = PIPELINE.map((step, i) => {
    const state = i < activeStep ? 'done' : (i === activeStep ? 'active' : '');
    return `<div class="pipeline-step">
      <div class="pipeline-dot ${state}"></div>
      <span class="pipeline-label ${state}">${step}</span>
    </div>`;
  }).join('');
}

// ── Brain Bars ──
const BRAINS = [
  { name: 'Primary', color: '#E74C3C' },
  { name: 'Analytical', color: '#3498DB' },
  { name: 'Creative', color: '#2ECC71' },
  { name: 'Strategic', color: '#F39C12' },
  { name: 'Knowledge', color: '#9B59B6' },
  { name: 'Intuitive', color: '#1ABC9C' },
];
let brainActivationLevels = [0,0,0,0,0,0];
let brainELOs = [1500,1500,1500,1500,1500,1500];

function renderBrainBars() {
  const el = document.getElementById('brainBars');
  el.innerHTML = BRAINS.map((b, i) => `
    <div class="brain-bar">
      <span class="name">${b.name}</span>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${brainActivationLevels[i]}%;background:${b.color};"></div>
      </div>
      <span class="elo">${brainELOs[i].toFixed(0)}</span>
    </div>
  `).join('');
}

// ── Metrics ──
let currentMetrics = {
  confidence: 0,
  consistency: 0,
  reward: 0,
  domain: '—',
  thinkCount: 0,
  brainsUsed: '—',
};

function renderMetrics() {
  const el = document.getElementById('metrics');
  el.innerHTML = `
    <div class="metric-row"><span class="metric-label">Confidence</span><span class="metric-value green">${(currentMetrics.confidence * 100).toFixed(1)}%</span></div>
    <div class="metric-row"><span class="metric-label">Consistency σ</span><span class="metric-value">${currentMetrics.consistency.toFixed(3)}</span></div>
    <div class="metric-row"><span class="metric-label">Reward</span><span class="metric-value gold">${currentMetrics.reward.toFixed(2)}</span></div>
    <div class="metric-row"><span class="metric-label">Domain</span><span class="metric-value">${currentMetrics.domain}</span></div>
    <div class="metric-row"><span class="metric-label">Think Count</span><span class="metric-value">${currentMetrics.thinkCount}</span></div>
    <div class="metric-row"><span class="metric-label">Active Brains</span><span class="metric-value green">${currentMetrics.brainsUsed}</span></div>
    <div class="metric-row"><span class="metric-label">Parameters</span><span class="metric-value red">17B</span></div>
    <div class="metric-row"><span class="metric-label">Architecture</span><span class="metric-value">Dense Transformer</span></div>
  `;
}

// ── Log ──
function addLog(text, cls = '') {
  const el = document.getElementById('logArea');
  el.innerHTML += `<div class="${cls}">${text}</div>`;
  el.scrollTop = el.scrollHeight;
}

// ── Processing Simulation ──
let isProcessing = false;

async function startProcessing() {
  if (isProcessing) return;
  isProcessing = true;

  const task = document.getElementById('taskInput').value || 'Implement binary search';
  const btn = document.getElementById('processBtn');
  const badge = document.getElementById('statusBadge');
  btn.disabled = true;
  badge.className = 'status-badge thinking';
  badge.textContent = 'THINKING';

  document.getElementById('logArea').innerHTML = '';
  deactivateAll();
  brainActivationLevels = [0,0,0,0,0,0];
  renderBrainBars();

  addLog(`<span class="step">[INPUT]</span> "${task}"`, 'step');
  await delay(400);

  // Step 0: Tokenize
  renderPipeline(0);
  addLog('<span class="step">[TOKENIZE]</span> Splitting into character-level tokens...', 'step');
  activateLayer(0, 1.0);
  await delay(600);
  activateLayer(1, 1.0);
  const tokens = task.split(/\s+/).length;
  addLog(`  ${tokens} words → ${task.length} char tokens`, 'dim');
  await delay(400);

  // Step 1: Embeddings
  renderPipeline(1);
  addLog('<span class="step">[EMBED]</span> Generating 4096-dim embeddings...', 'step');
  activateLayer(2, 1.0);
  await delay(600);
  addLog(`  Shape: [1, ${task.length}, 4096]`, 'dim');
  await delay(300);

  // Step 2: Positional encoding
  renderPipeline(2);
  addLog('<span class="step">[POS]</span> Sinusoidal positional encoding applied', 'step');
  await delay(400);

  // Step 3: Transformer forward
  renderPipeline(3);
  addLog('<span class="step">[TRANSFORMER]</span> Forward pass through 40 layers...', 'step');
  activateLayer(3, 1.0);
  for (let i = 0; i < 8; i++) {
    addLog(`  Layer ${i*5+1}-${(i+1)*5}: Multi-Head Attention (32 heads) → FFN (11008)`, 'dim');
    await delay(250);
  }
  addLog(`  <span class="highlight">17B parameters activated</span>`, '');
  await delay(300);

  // Step 4: Brain heads
  renderPipeline(4);
  addLog('<span class="step">[BRAINS]</span> Projecting to 6 specialist brain heads...', 'step');
  activateLayer(4, 1.0);
  await delay(400);

  // Detect domain and select brains
  const domainMap = {
    'binary search': 'code', 'algorithm': 'code', 'implement': 'code', 'python': 'code',
    'prove': 'math', 'calculate': 'math', 'equation': 'math',
    'write a poem': 'creative', 'story': 'creative', 'design': 'creative',
    'plan': 'strategic', 'strategy': 'strategic', 'business': 'strategic',
    'explain': 'knowledge', 'describe': 'knowledge', 'how does': 'knowledge',
    'puzzle': 'logic', 'solve': 'logic', 'fallacy': 'logic',
    'security': 'cybersecurity', 'injection': 'cybersecurity', 'attack': 'cybersecurity',
  };
  let detectedDomain = 'general';
  const taskLower = task.toLowerCase();
  for (const [keyword, domain] of Object.entries(domainMap)) {
    if (taskLower.includes(keyword)) { detectedDomain = domain; break; }
  }

  const brainSelectionMap = {
    'code': [1, 0], 'math': [1, 4], 'creative': [2, 5],
    'strategic': [3, 0], 'knowledge': [4, 1], 'logic': [1, 3],
    'cybersecurity': [4, 1], 'general': [0, 4], 'language': [4, 2],
  };
  const selectedBrains = brainSelectionMap[detectedDomain] || [0, 1];

  // Step 5: ELO selection
  renderPipeline(5);
  addLog(`<span class="step">[ELO]</span> Domain detected: <span class="highlight">${detectedDomain}</span>`, 'step');
  await delay(300);
  selectedBrains.forEach(bi => {
    brainActivationLevels[bi] = 85 + Math.random() * 15;
    brainELOs[bi] += 10 + Math.random() * 8;
  });
  activateBrains(selectedBrains, 1.0);
  renderBrainBars();
  const brainNames = selectedBrains.map(i => BRAINS[i].name);
  addLog(`  Selected: <span class="highlight">${brainNames.join(', ')}</span> (ELO-ranked)`, '');
  await delay(500);

  // Step 6: BrainBoost
  renderPipeline(6);
  addLog('<span class="step">[BRAINBOOST]</span> Gradient-boosted ensemble (fixed mode)...', 'step');
  activateLayer(5, 1.0);
  await delay(400);
  const confidence = 0.72 + Math.random() * 0.2;
  addLog(`  Ensemble confidence: <span class="highlight">${(confidence*100).toFixed(1)}%</span>`, '');
  await delay(300);

  // Step 7: Reward shaping
  renderPipeline(7);
  const correctness = 0.75 + Math.random() * 0.2;
  const reward = correctness * 10 + (correctness > 0.7 ? 1.5 : 0) + Math.random() * 2;
  addLog(`<span class="step">[REWARD]</span> Shaped reward: <span class="highlight">${reward.toFixed(2)}</span>`, 'step');
  addLog(`  Correctness: ${(correctness*100).toFixed(0)}% | Creativity bonus: ${correctness > 0.7 ? '+1.5' : '0.0'}`, 'dim');
  await delay(400);

  // Step 8: Consistency
  renderPipeline(8);
  const coherence = 0.85 + Math.random() * 0.15;
  const stability = 0.9 + Math.random() * 0.1;
  const sigma = 0.6 * coherence + 0.4 * stability;
  addLog(`<span class="step">[CONSISTENCY]</span> σ = 0.6×${coherence.toFixed(2)} + 0.4×${stability.toFixed(2)} = <span class="highlight">${sigma.toFixed(3)}</span>`, 'step');
  await delay(400);

  // Step 9: ELO update
  renderPipeline(9);
  addLog('<span class="step">[ELO UPDATE]</span> Updating brain ratings...', 'step');
  selectedBrains.forEach(bi => {
    const gain = 8 + Math.random() * 8;
    brainELOs[bi] += gain;
    addLog(`  ${BRAINS[bi].name}: +${gain.toFixed(1)} → ${brainELOs[bi].toFixed(0)}`, 'dim');
  });
  renderBrainBars();
  await delay(400);

  // Step 10: Memory store
  renderPipeline(10);
  addLog('<span class="step">[MEMORY]</span> Stored to episodic memory (SQLite)', 'step');
  addLog('  Experience buffer: +1 (PPO replay)', 'dim');
  await delay(300);

  // Step 11: Output
  renderPipeline(11);
  activateLayer(6, 1.0);
  addLog(`<span class="highlight">[OUTPUT]</span> Task processed successfully`, '');
  addLog(`  Domain: ${detectedDomain} | Brains: ${brainNames.join(', ')}`, 'dim');
  addLog(`  Confidence: ${(confidence*100).toFixed(1)}% | Reward: ${reward.toFixed(2)} | σ: ${sigma.toFixed(3)}`, 'dim');
  await delay(300);

  // Mark all pipeline steps as done
  renderPipeline(12);

  // Update metrics
  currentMetrics = {
    confidence: confidence,
    consistency: sigma,
    reward: reward,
    domain: detectedDomain,
    thinkCount: currentMetrics.thinkCount + 1,
    brainsUsed: brainNames.join(', '),
  };
  renderMetrics();

  badge.className = 'status-badge done';
  badge.textContent = 'COMPLETE';
  btn.disabled = false;
  isProcessing = false;

  // Slowly fade out activations
  setTimeout(() => {
    nodes.forEach(layer => layer.forEach(n => { n.targetActivation *= 0.5; }));
    connections.forEach(c => { c.targetActivation *= 0.3; });
  }, 2000);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Init ──
buildNetwork();
renderPipeline(-1);
renderBrainBars();
renderMetrics();
drawNetwork();
window.addEventListener('resize', () => { buildNetwork(); });

// Auto-start after 1 second
setTimeout(() => startProcessing(), 1000);
</script>
</body>
</html>
