<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIKTO — Loading</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background:#0a0a0a;
    display:flex; align-items:center; justify-content:center;
    height:100vh; overflow:hidden;
    font-family:'Segoe UI',system-ui,sans-serif;
  }

  /* ── Hex background pattern ── */
  .hex-bg{
    position:fixed; inset:0; z-index:0; opacity:.08;
    background-image:
      linear-gradient(30deg, #333 12%, transparent 12.5%, transparent 87%, #333 87.5%, #333),
      linear-gradient(150deg, #333 12%, transparent 12.5%, transparent 87%, #333 87.5%, #333),
      linear-gradient(30deg, #333 12%, transparent 12.5%, transparent 87%, #333 87.5%, #333),
      linear-gradient(150deg, #333 12%, transparent 12.5%, transparent 87%, #333 87.5%, #333),
      linear-gradient(60deg, #222 25%, transparent 25.5%, transparent 75%, #222 75%, #222),
      linear-gradient(60deg, #222 25%, transparent 25.5%, transparent 75%, #222 75%, #222);
    background-size:80px 140px;
    background-position:0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
  }

  .container{
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center; gap:40px;
  }

  /* ═══════════════════════════════════════════
     COIN — 3D two-sided logo
     ═══════════════════════════════════════════ */

  .coin-scene{
    width:300px; height:300px;
    perspective:900px;
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }

  /* Outer glow ring */
  .glow-ring{
    position:absolute; inset:-24px;
    border-radius:50%;
    border:2px solid rgba(160,180,200,.15);
    animation: pulseRing 3s ease-in-out infinite;
    pointer-events:none;
  }
  .glow-ring::after{
    content:''; position:absolute; inset:-10px;
    border-radius:50%;
    border:1px solid rgba(160,180,200,.07);
  }
  @keyframes pulseRing{
    0%,100%{ transform:scale(1); opacity:.5; }
    50%    { transform:scale(1.08); opacity:1; }
  }

  /* The coin itself — preserves 3D for children */
  .coin{
    width:280px; height:280px;
    position:relative;
    transform-style:preserve-3d;
    animation: coinFlip 5s cubic-bezier(.42,0,.58,1) infinite;
    filter: drop-shadow(0 0 40px rgba(140,160,190,.3));
    will-change:transform;
  }

  /* Each face of the coin */
  .coin-face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:50%;
    overflow:hidden;
  }
  .coin-face img{
    width:100%; height:100%;
    object-fit:contain;
    pointer-events:none;
  }

  /* Front: mathematical formulas (logo-2: has 3³) */
  .coin-front{
    z-index:2;
  }

  /* Back: alien + person (logo-1: has the faces) — rotated 180° so it shows when flipped */
  .coin-back{
    transform:rotateY(180deg);
  }

  /* Thin edge visible during flip — gives coin thickness */
  .coin-edge{
    position:absolute;
    top:10%; bottom:10%;
    left:50%; width:6px;
    margin-left:-3px;
    background:linear-gradient(180deg, #555, #888, #555);
    transform:rotateY(90deg);
    transform-origin:center;
    border-radius:2px;
  }

  /*
    COIN ANIMATION SEQUENCE:
    Phase 1 (0-40%):   Flip forward 180° on Y axis
                        → reveals the back face (alien+person)
    Phase 2 (40-50%):  Pause — hold the back face visible
    Phase 3 (50-95%):  Full 360° spin on Y axis
                        → shows both sides in one fluid motion
    Phase 4 (95-100%): Settle back to front face
  */
  @keyframes coinFlip{
    /* Start: front face (math formulas) visible */
    0%    { transform: rotateY(0deg);   }
    5%    { transform: rotateY(0deg);   }

    /* Phase 1: flip forward 180° — reveals back (alien+person) */
    30%   { transform: rotateY(180deg); }

    /* Pause on back face */
    40%   { transform: rotateY(180deg); }

    /* Phase 2: full 360° spin from current position (180 → 540) */
    90%   { transform: rotateY(540deg); }

    /* Settle — back to front face (540 = 360+180, so add another 180 to land on 720=0) */
    /* Actually 540 shows the back face. Go to 720 to return to front */
    95%   { transform: rotateY(720deg); }
    100%  { transform: rotateY(720deg); }
  }

  /* ── Metallic shimmer that sweeps across during flip ── */
  .coin::after{
    content:'';
    position:absolute; inset:0;
    border-radius:50%;
    background:linear-gradient(
      105deg,
      transparent 30%,
      rgba(255,255,255,.12) 45%,
      rgba(255,255,255,.25) 50%,
      rgba(255,255,255,.12) 55%,
      transparent 70%
    );
    z-index:10;
    pointer-events:none;
    animation: shimmer 5s ease-in-out infinite;
  }
  @keyframes shimmer{
    0%,5%  { opacity:0; }
    15%    { opacity:1; }
    35%    { opacity:0; }
    50%,55%{ opacity:0; }
    65%    { opacity:1; }
    85%    { opacity:0; }
    100%   { opacity:0; }
  }

  /* ── Text ── */
  .brand{
    text-align:center;
    animation: fadeUp 1.2s ease-out both;
  }
  .brand h1{
    font-size:42px; font-weight:300; letter-spacing:18px;
    color:#c8cdd4;
    text-shadow:0 0 30px rgba(160,180,200,.25);
    margin-bottom:6px;
  }
  .brand .sub{
    font-size:13px; letter-spacing:6px; color:#6a7080;
    text-transform:uppercase;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(20px); }
    to  { opacity:1; transform:translateY(0); }
  }

  /* ── Progress bar ── */
  .progress-wrap{
    width:280px; height:3px;
    background:rgba(255,255,255,.06);
    border-radius:2px; overflow:hidden;
    animation: fadeUp 1.6s ease-out both;
  }
  .progress-bar{
    height:100%; width:0%;
    background:linear-gradient(90deg, #4a5568, #8a9bb0, #c8cdd4);
    border-radius:2px;
    animation: load 8s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  @keyframes load{
    0%  { width:0%;   }
    15% { width:12%;  }
    30% { width:28%;  }
    50% { width:55%;  }
    70% { width:72%;  }
    85% { width:88%;  }
    95% { width:96%;  }
    100%{ width:100%; }
  }

  .status{
    font-size:11px; letter-spacing:3px; color:#4a5060;
    text-transform:uppercase;
    animation: fadeUp 2s ease-out both;
  }
  .status span{
    animation: blink 1.4s step-end infinite;
  }
  @keyframes blink{
    50%{ opacity:0; }
  }

  /* ── Corner hex accents ── */
  .corner-hex{
    position:fixed; width:60px; height:60px; opacity:.04; z-index:0;
  }
  .corner-hex svg{ width:100%; height:100%; fill:#aab; }
  .corner-hex.tl{ top:30px; left:30px; }
  .corner-hex.tr{ top:30px; right:30px; }
  .corner-hex.bl{ bottom:30px; left:30px; }
  .corner-hex.br{ bottom:30px; right:30px; }

  /* ── Particle shimmer ── */
  .particles{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }
  .particle{
    position:absolute;
    width:2px; height:2px;
    background:rgba(180,190,210,.3);
    border-radius:50%;
    animation: drift linear infinite;
  }
  @keyframes drift{
    from{ transform:translateY(100vh) scale(0); opacity:0; }
    10% { opacity:1; }
    90% { opacity:1; }
    to  { transform:translateY(-10vh) scale(1); opacity:0; }
  }
</style>
</head>
<body>

<div class="hex-bg"></div>

<!-- Corner hexagons -->
<div class="corner-hex tl"><svg viewBox="0 0 100 115"><polygon points="50,0 100,28.8 100,86.4 50,115 0,86.4 0,28.8"/></svg></div>
<div class="corner-hex tr"><svg viewBox="0 0 100 115"><polygon points="50,0 100,28.8 100,86.4 50,115 0,86.4 0,28.8"/></svg></div>
<div class="corner-hex bl"><svg viewBox="0 0 100 115"><polygon points="50,0 100,28.8 100,86.4 50,115 0,86.4 0,28.8"/></svg></div>
<div class="corner-hex br"><svg viewBox="0 0 100 115"><polygon points="50,0 100,28.8 100,86.4 50,115 0,86.4 0,28.8"/></svg></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="container">

  <!-- 3D coin with two faces -->
  <div class="coin-scene">
    <div class="glow-ring"></div>
    <div class="coin">
      <!-- Front face: mathematical formulas side -->
      <div class="coin-face coin-front">
        <img src="images/nikto-logo-2.png" alt="NIKTO — Formulas">
      </div>
      <!-- Back face: alien + person side -->
      <div class="coin-face coin-back">
        <img src="images/nikto-logo-1.png" alt="NIKTO — Alliance">
      </div>
      <!-- Coin edge for thickness illusion -->
      <div class="coin-edge"></div>
    </div>
  </div>

  <div class="brand">
    <h1>NIKTO</h1>
    <div class="sub">Cognitive Systems AI</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <div class="status">
    Initializing neural core<span>_</span>
  </div>
</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }

  // Cycle status messages
  const msgs = [
    'Initializing neural core',
    'Loading 17B parameters',
    'Activating 6 specialist brains',
    'Calibrating ELO ratings',
    'Preparing knowledge base',
    'Syncing memory stores',
    'Warming transformer layers',
    'System ready'
  ];
  const statusEl = document.querySelector('.status');
  let mi = 0;
  setInterval(() => {
    mi = (mi + 1) % msgs.length;
    statusEl.innerHTML = msgs[mi] + '<span>_</span>';
  }, 2800);
</script>
</body>
</html>
